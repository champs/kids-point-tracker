<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Kids Points Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Parent Login
            </h2>
            <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
            <button onclick="login()" class="btn-primary">Login</button>
            <p id="authError" class="error-message"></p>
        </div>
    </div>

    <!-- Main Container -->
    <div id="mainApp" style="display: none;">
        <!-- Header -->
        <header>
            <h1>
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Points Tracker
            </h1>
            <button onclick="showSettings()" class="settings-btn" aria-label="Settings">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </header>

        <!-- Kids Dashboard -->
        <div id="kidsDashboard" class="kids-container"></div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <h3>Quick Add/Remove</h3>
            <div id="selectedKid" class="selected-kid">Tap a kid above to start</div>
            
            <div class="points-input-section">
                <div class="input-group">
                    <label>Points (minutes)</label>
                    <div class="number-input">
                        <button onclick="decrementPoints()" class="btn-number">-</button>
                        <input type="number" id="pointsInput" value="5" min="1" max="999">
                        <button onclick="incrementPoints()" class="btn-number">+</button>
                    </div>
                </div>

                <div class="quick-buttons">
                    <button onclick="setPoints(5)" class="quick-btn selected" data-value="5">5</button>
                    <button onclick="setPoints(10)" class="quick-btn" data-value="10">10</button>
                    <button onclick="setPoints(15)" class="quick-btn" data-value="15">15</button>
                    <button onclick="setPoints(30)" class="quick-btn" data-value="30">30</button>
                </div>
            </div>

            <div class="tags-section">
                <label>Choose Activity <span style="color: var(--text-muted); font-weight: normal; font-size: 0.85rem;">(optional)</span></label>
                <div id="tagsList" class="tags-container"></div>
                <button onclick="showNewTagModal()" class="btn-secondary">+ New Tag</button>
            </div>

            <div class="action-buttons">
                <button onclick="addPoints()" class="btn-add">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/></svg>
                    Add Points
                </button>
                <button onclick="removePoints()" class="btn-remove">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14"/></svg>
                    Remove Points
                </button>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="activity-log">
            <h3>
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Recent Activity
            </h3>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Settings
                </h2>
                <button onclick="closeSettings()" class="close-btn" aria-label="Close">✕</button>
            </div>
            <div id="settingsContent"></div>
        </div>
    </div>

    <!-- New Tag Modal -->
    <div id="newTagModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Tag</h2>
                <button onclick="closeNewTagModal()" class="close-btn" aria-label="Close">✕</button>
            </div>
            <div class="form-group">
                <label>Tag Name</label>
                <input type="text" id="newTagName" placeholder="e.g., Homework">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="newTagType">
                    <option value="1">Positive (earns points)</option>
                    <option value="0">Negative (spends points)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Color</label>
                <div class="color-picker">
                    <button class="color-btn" style="background: #FF6B6B" onclick="selectTagColor('#FF6B6B')"></button>
                    <button class="color-btn" style="background: #4ECDC4" onclick="selectTagColor('#4ECDC4')"></button>
                    <button class="color-btn" style="background: #45B7D1" onclick="selectTagColor('#45B7D1')"></button>
                    <button class="color-btn" style="background: #96CEB4" onclick="selectTagColor('#96CEB4')"></button>
                    <button class="color-btn" style="background: #FFEAA7" onclick="selectTagColor('#FFEAA7')"></button>
                    <button class="color-btn" style="background: #DFE6E9" onclick="selectTagColor('#DFE6E9')"></button>
                    <button class="color-btn" style="background: #A29BFE" onclick="selectTagColor('#A29BFE')"></button>
                    <button class="color-btn" style="background: #FD79A8" onclick="selectTagColor('#FD79A8')"></button>
                </div>
            </div>
            <button onclick="createNewTag()" class="btn-primary">Create Tag</button>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="app.js"></script>
</body>
</html>
